apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: sre-endterm
type: Opaque
stringData:
  DATABASE_URL: postgresql://app:app@postgres:5432/appdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sre-endterm
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: app }
            - { name: POSTGRES_PASSWORD, value: app }
            - { name: POSTGRES_DB, value: appdb }
          ports: [{ containerPort: 5432 }]
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sre-endterm
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sre-endterm
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 20 }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sre-endterm
spec:
  selector: { app: api-gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sre-endterm
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: frontend:latest
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sre-endterm
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
