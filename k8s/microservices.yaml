apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: sre-endterm }
spec:
  replicas: 1
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: app
          image: auth-service:latest
          env: [{ name: DATABASE_URL, valueFrom: { secretKeyRef: { name: app-secret, key: DATABASE_URL } } }]
          ports: [{ containerPort: 3001 }]
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: sre-endterm }
spec: { selector: { app: auth-service }, ports: [{ port: 3001, targetPort: 3001 }] }
---
