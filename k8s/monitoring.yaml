apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-endterm
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: api-gateway
        static_configs: [{ targets: ["api-gateway:8080"] }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: prometheus, namespace: sre-endterm }
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{ containerPort: 9090 }]
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: sre-endterm }
spec: { selector: { app: prometheus }, ports: [{ port: 9090, targetPort: 9090 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: grafana, namespace: sre-endterm }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: sre-endterm }
spec: { selector: { app: grafana }, ports: [{ port: 3000, targetPort: 3000 }] }
