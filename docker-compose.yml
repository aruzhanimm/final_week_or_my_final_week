version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure

  api-gateway:
    build: ./services/api-gateway
    ports: ["8080:8080"]
    depends_on: [auth-service, product-service, order-service, payment-service, notification-service, user-profile-service]
    deploy:
      replicas: 2
      restart_policy: { condition: on-failure }

  auth-service:
    build: ./services/auth-service
    environment: { DATABASE_URL: postgresql://app:app@postgres:5432/appdb }
    depends_on: [postgres]
    deploy: { restart_policy: { condition: on-failure } }
  product-service:
    build: ./services/product-service
    environment: { DATABASE_URL: postgresql://app:app@postgres:5432/appdb }
    depends_on: [postgres]
    deploy: { restart_policy: { condition: on-failure } }
  order-service:
    build: ./services/order-service
    environment: { DATABASE_URL: postgresql://app:app@postgres:5432/appdb }
    depends_on: [postgres]
    deploy:
      replicas: 2
      restart_policy: { condition: on-failure }
  payment-service:
    build: ./services/payment-service
    environment: { DATABASE_URL: postgresql://app:app@postgres:5432/appdb }
    depends_on: [postgres]
    deploy:
      replicas: 2
      restart_policy: { condition: on-failure }
  notification-service:
    build: ./services/notification-service
    environment: { DATABASE_URL: postgresql://app:app@postgres:5432/appdb }
    depends_on: [postgres]
    deploy: { restart_policy: { condition: on-failure } }
  user-profile-service:
    build: ./services/user-profile-service
    environment: { DATABASE_URL: postgresql://app:app@postgres:5432/appdb }
    depends_on: [postgres]
    deploy: { restart_policy: { condition: on-failure } }

  frontend:
    build: ./frontend
    ports: ["80:80"]
    depends_on: [api-gateway]
    deploy: { restart_policy: { condition: on-failure } }

  prometheus:
    image: prom/prometheus:v2.54.1
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
