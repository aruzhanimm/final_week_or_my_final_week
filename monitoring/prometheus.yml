global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "api-gateway"
    static_configs: [{ targets: ["api-gateway:8080"] }]
    metrics_path: /metrics
  - job_name: "auth-service"
    static_configs: [{ targets: ["auth-service:3001"] }]
    metrics_path: /metrics
  - job_name: "product-service"
    static_configs: [{ targets: ["product-service:3002"] }]
    metrics_path: /metrics
  - job_name: "order-service"
    static_configs: [{ targets: ["order-service:3003"] }]
    metrics_path: /metrics
  - job_name: "payment-service"
    static_configs: [{ targets: ["payment-service:3004"] }]
    metrics_path: /metrics
  - job_name: "notification-service"
    static_configs: [{ targets: ["notification-service:3005"] }]
    metrics_path: /metrics
  - job_name: "user-profile-service"
    static_configs: [{ targets: ["user-profile-service:3006"] }]
    metrics_path: /metrics
